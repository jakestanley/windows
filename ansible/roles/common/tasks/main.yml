---
# community.windows.win_winget does not exist yet (tracked as community.windows#611);
# install / uninstall are driven through win_powershell wrappers around winget.exe.

- name: Install desktop packages via winget
  ansible.windows.win_powershell:
    script: |
      $packages = @(
        @{ id = 'Valve.Steam';                          source = 'winget' },
        @{ id = 'Mozilla.Firefox';                      source = 'winget' },
        @{ id = 'Discord.Discord';                      source = 'winget' },
        @{ id = 'Dropbox.Dropbox';                      source = 'winget' },
        @{ id = 'AgileBits.1Password';                  source = 'winget' },
        @{ id = 'Obsidian.Obsidian';                    source = 'winget' },
        @{ id = 'Microsoft.Git';                        source = 'winget' },
        @{ id = 'Hawaii_Beach.TinyNvidiaUpdateChecker'; source = 'winget' },
        @{ id = 'ImageMagick.Q16';                      source = 'winget' },
        @{ id = 'Microsoft.GamingApp';                  source = 'winget' },  # Xbox app
        @{ id = '9NKSQGP7F2NH';                         source = 'msstore' }  # WhatsApp
      )
      $changed = @()
      $alreadyOk = @()
      foreach ($p in $packages) {
        $out = & winget install --exact --id $p.id --source $p.source `
            --silent --accept-source-agreements --accept-package-agreements 2>&1 | Out-String
        $rc = $LASTEXITCODE
        # winget returns -1978335189 (0x8A15002B) when the package is already
        # installed; treat that as a no-op rather than a failure.
        if ($rc -eq 0) {
          $changed += $p.id
        } elseif ($rc -eq -1978335189 -or $out -match 'already installed') {
          $alreadyOk += $p.id
        } else {
          throw "winget install $($p.id) failed (rc=$rc): $out"
        }
      }
      $Ansible.Changed = $changed.Count -gt 0
      $Ansible.Result  = @{ installed = $changed; already_present = $alreadyOk }

- name: Check and install NVIDIA driver updates via TinyNvidiaUpdateChecker
  ansible.windows.win_powershell:
    script: |
      $exe = (Get-Command TinyNvidiaUpdateChecker.exe -ErrorAction SilentlyContinue).Source
      if (-not $exe) { throw "TinyNvidiaUpdateChecker.exe not on PATH; ensure winget install step has run." }
      # --quiet: no nag when up to date
      # --noprompt: do not prompt to exit
      # --confirm-dl: download and install without any user interaction
      $out = & $exe --quiet --noprompt --confirm-dl 2>&1 | Out-String
      $rc = $LASTEXITCODE
      if ($rc -ne 0) { throw "TinyNvidiaUpdateChecker exited $rc: $out" }
      $Ansible.Changed = ($out -match 'Downloading|Installing|Update available')
      $Ansible.Result  = @{ output_tail = ($out -split "`n" | Select-Object -Last 10) -join "`n" }

- name: Remove default Microsoft bloatware via winget
  ansible.windows.win_powershell:
    script: |
      $names = @(
        'Microsoft OneDrive',
        'Outlook',
        'Mail and Calendar',
        'Weather',
        'News',
        'Get Help',
        'Microsoft Teams',
        'Feedback Hub',
        'Windows Camera',
        'Power Automate',
        'Microsoft Sticky Notes',
        'Paint',
        'Microsoft Clipchamp',
        'Microsoft To Do',
        'Microsoft Photos',
        'Microsoft Family',
        'Windows Media Player'
      )
      $removed = @()
      $absent  = @()
      foreach ($n in $names) {
        $out = & winget uninstall --exact --name $n --silent `
            --accept-source-agreements 2>&1 | Out-String
        $rc = $LASTEXITCODE
        # 0x8A150014 (-1978335212) = no installed package found
        if ($rc -eq 0) {
          $removed += $n
        } elseif ($rc -eq -1978335212 -or $out -match 'No installed package found') {
          $absent += $n
        } else {
          # don't fail the play on individual stubborn entries
          $absent += "$n (rc=$rc)"
        }
      }
      $Ansible.Changed = $removed.Count -gt 0
      $Ansible.Result  = @{ removed = $removed; not_installed = $absent }

- name: Disable telemetry and search services
  ansible.windows.win_service:
    name: "{{ item }}"
    state: stopped
    start_mode: disabled
  loop:
    - WSearch
    - DiagTrack
    - dmwappushservice

- name: Disable Fast Startup so Wake-on-LAN works after shutdown
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Power
    name: HiberbootEnabled
    data: 0
    type: dword

- name: Allow inbound ICMPv4 echo (ping)
  community.windows.win_firewall_rule:
    name: ICMPv4 Echo Request (ping)
    direction: in
    action: allow
    protocol: icmpv4
    icmp_type_code:
      - "8:*"
    enabled: true
    profiles: [domain, private]

- name: Ensure w32time service is auto-started
  ansible.windows.win_service:
    name: w32time
    state: started
    start_mode: auto

- name: Configure NTP peers and force resync
  ansible.windows.win_powershell:
    script: |
      $peers = (w32tm /query /configuration | Select-String 'NtpServer:').ToString()
      $want  = 'time.cloudflare.com,0x9 uk.pool.ntp.org,0x9'
      if ($peers -notmatch [regex]::Escape($want)) {
        w32tm /config /manualpeerlist:"$want" /syncfromflags:manual /reliable:yes /update | Out-Null
        Restart-Service w32time -Force
        Start-Sleep 2
        w32tm /resync /force | Out-Null
        $Ansible.Changed = $true
      } else {
        $Ansible.Changed = $false
      }

- name: Enable Wake-on-Magic-Packet on active NICs
  ansible.windows.win_powershell:
    script: |
      $changed = $false
      Get-NetAdapter -Physical | Where-Object Status -eq 'Up' | ForEach-Object {
        try {
          $pm = Get-NetAdapterPowerManagement -Name $_.Name -ErrorAction Stop
          if ($pm.WakeOnMagicPacket -ne 'Enabled') {
            Set-NetAdapterPowerManagement -Name $_.Name -WakeOnMagicPacket Enabled -ErrorAction Stop
            $changed = $true
          }
        } catch {}
      }
      $Ansible.Changed = $changed

- name: Install Sleep-on-LAN
  ansible.builtin.import_tasks: sleep-on-lan.yml

- name: Disable Bing search in Start menu
  ansible.windows.win_regedit:
    path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Search
    name: BingSearchEnabled
    data: 0
    type: dword

- name: Disable Cortana web search consent
  ansible.windows.win_regedit:
    path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Search
    name: CortanaConsent
    data: 0
    type: dword

- name: Restore classic right-click context menu (Windows 11)
  ansible.windows.win_regedit:
    path: HKCU:\Software\Classes\CLSID\{86ca1aa0-34aa-4e8b-a509-50c905bae2a2}\InprocServer32
    name: "(default)"
    data: ""
    type: string
  register: classic_context_menu

- name: Restart Explorer to apply classic context menu
  ansible.windows.win_shell: |
    Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
  when: classic_context_menu.changed

- name: Ensure relocated user folders exist on D:\
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - D:\Downloads
    - D:\Videos

- name: Relocate Downloads to D:\Downloads
  ansible.windows.win_regedit:
    path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\User Shell Folders
    name: "{374DE290-123F-4565-9164-39C4925E467B}"
    data: D:\Downloads
    type: expandstring

- name: Relocate Videos to D:\Videos
  ansible.windows.win_regedit:
    path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\User Shell Folders
    name: "My Video"
    data: D:\Videos
    type: expandstring
