---
# Desktop GUI app installation and NVIDIA driver updates are intentionally
# not managed by Ansible — both need an interactive user session that WinRM
# does not provide. See docs/maintenance.md and README "Platform limitations"
# for the manual procedures.

- name: Remove default Microsoft bloatware AppX packages
  ansible.windows.win_powershell:
    script: |
      # Native Remove-AppxPackage works over WinRM (no WindowsApps ACL issue
      # since we're not executing a packaged binary, just operating on the
      # package metadata via the AppX deployment service).
      $packages = @(
        'Microsoft.OutlookForWindows',       # Outlook (new)
        'microsoft.windowscommunicationsapps',# Mail and Calendar
        'Microsoft.BingWeather',             # Weather
        'Microsoft.BingNews',                # News
        'Microsoft.GetHelp',                 # Get Help
        'MicrosoftTeams',                    # Teams (consumer)
        'Microsoft.WindowsFeedbackHub',      # Feedback Hub
        'Microsoft.WindowsCamera',           # Camera
        'Microsoft.PowerAutomateDesktop',    # Power Automate
        'Microsoft.MicrosoftStickyNotes',    # Sticky Notes
        'Microsoft.Paint',                   # Paint
        'Clipchamp.Clipchamp',               # Clipchamp
        'Microsoft.Todos',                   # To Do
        'Microsoft.Windows.Photos',          # Photos
        'MicrosoftCorporationII.MicrosoftFamily', # Family
        'Microsoft.ZuneMusic',               # Media Player / Groove legacy
        'Microsoft.ZuneVideo'                # Movies & TV
      )
      $removed = @()
      $absent  = @()
      $errored = @()
      foreach ($name in $packages) {
        $pkgs = Get-AppxPackage -Name $name -AllUsers -ErrorAction SilentlyContinue
        if (-not $pkgs) { $absent += $name; continue }
        foreach ($pkg in $pkgs) {
          try {
            Remove-AppxPackage -Package $pkg.PackageFullName -AllUsers -ErrorAction Stop
            $removed += $pkg.Name
          } catch {
            $errored += "$($pkg.Name): $($_.Exception.Message)"
          }
        }
        # Also strip from provisioning so new user accounts don't get it back.
        Get-AppxProvisionedPackage -Online |
          Where-Object DisplayName -eq $name |
          ForEach-Object {
            Remove-AppxProvisionedPackage -Online -PackageName $_.PackageName -ErrorAction SilentlyContinue | Out-Null
          }
      }
      $Ansible.Changed = $removed.Count -gt 0
      $Ansible.Result  = @{ removed = $removed; not_installed = $absent; errored = $errored }

- name: Disable telemetry and search services
  ansible.windows.win_service:
    name: "{{ item }}"
    state: stopped
    start_mode: disabled
  loop:
    - WSearch
    - DiagTrack
    - dmwappushservice

- name: Disable Fast Startup so Wake-on-LAN works after shutdown
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Power
    name: HiberbootEnabled
    data: 0
    type: dword

- name: Allow inbound ICMPv4 echo (ping)
  community.windows.win_firewall_rule:
    name: ICMPv4 Echo Request (ping)
    direction: in
    action: allow
    protocol: icmpv4
    icmp_type_code:
      - "8:*"
    enabled: true
    profiles: [domain, private]

- name: Ensure w32time service is auto-started
  ansible.windows.win_service:
    name: w32time
    state: started
    start_mode: auto

- name: Configure NTP peers and force resync
  ansible.windows.win_powershell:
    script: |
      $peers = (w32tm /query /configuration | Select-String 'NtpServer:').ToString()
      $want  = 'time.cloudflare.com,0x9 uk.pool.ntp.org,0x9'
      if ($peers -notmatch [regex]::Escape($want)) {
        w32tm /config /manualpeerlist:"$want" /syncfromflags:manual /reliable:yes /update | Out-Null
        Restart-Service w32time -Force
        Start-Sleep 2
        w32tm /resync /force | Out-Null
        $Ansible.Changed = $true
      } else {
        $Ansible.Changed = $false
      }

- name: Enable Wake-on-Magic-Packet on active NICs
  # Enables magic-packet wake, disables pattern-match wake, and flips
  # Realtek's WolShutdownLinkSpeed away from "10 Mbps First".
  # * Pattern wake fires on stray traffic (ARP for me, mDNS, broadcast
  #   chatter) which caused spurious wakes from S3 — magic packet only
  #   for deliberate WoL.
  # * WolShutdownLinkSpeed default renegotiates to 10Mbit half-duplex on
  #   sleep; many 1G switches drop the port during renegotiation and
  #   magic packets never arrive. "Not Speed Down" (RegistryValue=2)
  #   keeps the link at native speed through S3.
  # Non-Realtek NICs don't expose WolShutdownLinkSpeed; try/catch skips.
  ansible.windows.win_powershell:
    script: |
      $changed = $false
      Get-NetAdapter -Physical | Where-Object Status -eq 'Up' | ForEach-Object {
        $nic = $_
        try {
          $pm = Get-NetAdapterPowerManagement -Name $nic.Name -ErrorAction Stop
          $args = @{}
          if ($pm.WakeOnMagicPacket -ne 'Enabled')  { $args.WakeOnMagicPacket = 'Enabled' }
          if ($pm.WakeOnPattern     -ne 'Disabled') { $args.WakeOnPattern     = 'Disabled' }
          if ($args.Count -gt 0) {
            Set-NetAdapterPowerManagement -Name $nic.Name @args -ErrorAction Stop
            $changed = $true
          }
        } catch {}
        try {
          $prop = Get-NetAdapterAdvancedProperty -Name $nic.Name -RegistryKeyword WolShutdownLinkSpeed -ErrorAction Stop
          if ($prop.RegistryValue -ne '2') {
            Set-NetAdapterAdvancedProperty -Name $nic.Name -RegistryKeyword WolShutdownLinkSpeed -RegistryValue 2 -NoRestart -ErrorAction Stop
            $changed = $true
          }
        } catch {}
      }
      $Ansible.Changed = $changed

- name: Disable wake capability on noisy devices
  # USB host controllers wake the platform when any attached device
  # signals wake — spontaneous mouse jitter, keyboard key repeat, Oculus
  # Link cable polling, wireless controller dongles. Individual HID
  # entries stay wake-armed so pressing a key at the desk still works.
  ansible.windows.win_powershell:
    script: |
      $armed  = @(powercfg /devicequery wake_armed)
      $wanted = @(
      {% for d in wake_disable_devices %}
        '{{ d }}'{{ ',' if not loop.last else '' }}
      {% endfor %}
      )
      $disabled = @()
      foreach ($d in $wanted) {
        if ($armed -contains $d) {
          powercfg /devicedisablewake $d | Out-Null
          $disabled += $d
        }
      }
      if ($disabled.Count -gt 0) {
        $Ansible.Changed = $true
        $Ansible.Result  = @{ disabled = $disabled }
      } else {
        $Ansible.Changed = $false
      }

- name: Install Sleep-on-LAN
  ansible.builtin.import_tasks: sleep-on-lan.yml

- name: Trust Stanley Homelab Root CA
  ansible.builtin.import_tasks: trust-ca.yml

- name: Ensure declared directories are on the machine PATH
  ansible.windows.win_powershell:
    script: |
      $wanted = @(
      {% for dir in machine_path_additions %}
        '{{ dir }}'{{ ',' if not loop.last else '' }}
      {% endfor %}
      )
      $current = [Environment]::GetEnvironmentVariable('PATH', 'Machine')
      $entries = @($current -split ';' | Where-Object { $_ -ne '' })
      $added = @()
      foreach ($w in $wanted) {
        if ($entries -notcontains $w) {
          $entries += $w
          $added += $w
        }
      }
      if ($added.Count -gt 0) {
        [Environment]::SetEnvironmentVariable('PATH', ($entries -join ';'), 'Machine')
        $Ansible.Changed = $true
        $Ansible.Result  = @{ added = $added }
      } else {
        $Ansible.Changed = $false
      }

- name: Disable Bing search in Start menu
  ansible.windows.win_regedit:
    path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Search
    name: BingSearchEnabled
    data: 0
    type: dword

- name: Disable Cortana web search consent
  ansible.windows.win_regedit:
    path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Search
    name: CortanaConsent
    data: 0
    type: dword

- name: Restore classic right-click context menu (Windows 11)
  ansible.windows.win_regedit:
    path: HKCU:\Software\Classes\CLSID\{86ca1aa0-34aa-4e8b-a509-50c905bae2a2}\InprocServer32
    name: "(default)"
    data: ""
    type: string
  register: classic_context_menu

- name: Restart Explorer to apply classic context menu
  ansible.windows.win_shell: |
    Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
  when: classic_context_menu.changed

- name: Ensure relocated user folders exist on D:\
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - D:\Downloads
    - D:\Videos

- name: Relocate Downloads to D:\Downloads
  ansible.windows.win_regedit:
    path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\User Shell Folders
    name: "{374DE290-123F-4565-9164-39C4925E467B}"
    data: D:\Downloads
    type: expandstring

- name: Relocate Videos to D:\Videos
  ansible.windows.win_regedit:
    path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\User Shell Folders
    name: "My Video"
    data: D:\Videos
    type: expandstring
