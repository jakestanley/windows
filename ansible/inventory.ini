[windows]
shrike ansible_host=shrike.stanley.arpa

[windows:vars]
ansible_connection=winrm
ansible_user=ansible
ansible_port=5985
ansible_winrm_scheme=http
ansible_winrm_transport=ntlm
ansible_winrm_server_cert_validation=ignore
# Bumped for long-running tasks (Chocolatey installing big apps, robocopy, etc.).
# Defaults (30s/20s) timed out during Steam install.
ansible_winrm_read_timeout_sec=1800
ansible_winrm_operation_timeout_sec=1500

# Experimental: SSH-as-mail for desktop app management via winget.
# See docs/ssh-setup.md. Do not use this group for the standard
# shrike-bootstrap playbook — it targets the wrong user.
[shrike_ssh]
shrike-ssh ansible_host=shrike.stanley.arpa

[shrike_ssh:vars]
ansible_connection=ssh
ansible_user=mail
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new
ansible_shell_type=powershell
