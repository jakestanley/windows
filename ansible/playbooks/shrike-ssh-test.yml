---
# Smoke test for SSH-as-mail winget over Ansible.
# Installs only TinyNvidiaUpdateChecker. See docs/unattended.md.
- name: shrike — winget smoke test (SSH as mail)
  hosts: shrike_ssh
  gather_facts: false
  tasks:
    # PowerShell does not propagate native command exit codes by
    # default; the trailing `exit $LASTEXITCODE` forces winget's
    # status into ansible's rc. The SSH transport may also truncate
    # negative exit codes to the low byte (so -1978335189 -> 43),
    # so the stdout "already installed" check is the source of truth;
    # rc is a coarse signal only.
    - name: Install TinyNvidiaUpdateChecker via winget
      ansible.builtin.raw: >-
        winget install --exact --id Hawaii_Beach.TinyNvidiaUpdateChecker
        --source winget --silent
        --accept-source-agreements --accept-package-agreements 2>&1;
        exit $LASTEXITCODE
      register: winget_result
      changed_when:
        - winget_result.rc == 0
        - "'already installed' not in (winget_result.stdout | default('') | lower)"
      failed_when:
        - winget_result.rc != 0
        - "'already installed' not in (winget_result.stdout | default('') | lower)"

    - name: Show winget output tail
      ansible.builtin.debug:
        msg: "{{ (winget_result.stdout | default('')).split('\n')[-12:] | join('\n') }}"
