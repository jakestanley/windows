---
# One-time SSH transport bootstrap for shrike. Runs over WinRM as the
# `ansible` user (the regular shrike inventory entry). Idempotent.
#
# Sets shrike up so SSH key auth as `mail` works, so that subsequent
# winget-over-ansible work can run via the SSH transport instead of
# WinRM. See docs/unattended.md "SSH transport for desktop apps".
#
# Prerequisite: an SSH keypair at ~/.ssh/id_ed25519{,.pub} on the
# controller (the default macOS / Linux ed25519 location). Override
# with -e ssh_public_key_path=... if yours lives elsewhere.
- name: shrike — SSH transport bootstrap
  hosts: windows
  gather_facts: false
  vars:
    ssh_public_key_path: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519.pub"
    controller_public_key: "{{ lookup('file', ssh_public_key_path) }}"
  tasks:
    - name: Install OpenSSH Server capability
      ansible.windows.win_powershell:
        script: |
          $cap = Get-WindowsCapability -Online -Name 'OpenSSH.Server~~~~0.0.1.0'
          if ($cap.State -eq 'Installed') {
            $Ansible.Changed = $false
          } else {
            $null = Add-WindowsCapability -Online -Name 'OpenSSH.Server~~~~0.0.1.0'
            $Ansible.Changed = $true
          }

    - name: Ensure sshd is running and auto-starts
      ansible.windows.win_service:
        name: sshd
        state: started
        start_mode: auto

    - name: Allow SSH inbound (TCP 22)
      community.windows.win_firewall_rule:
        name: OpenSSH (TCP-22)
        localport: 22
        protocol: tcp
        direction: in
        action: allow
        enabled: true
        profiles: [domain, private]

    - name: Default SSH shell to PowerShell
      # OpenSSH on Windows defaults to cmd.exe; PS gives readable winget
      # output and matches the rest of the host's automation surface.
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\OpenSSH
        name: DefaultShell
        data: C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe
        type: string

    - name: Ensure C:\ProgramData\ssh exists
      ansible.windows.win_file:
        path: C:\ProgramData\ssh
        state: directory

    - name: Install controller's public key for admin users
      # `mail` is in the Administrators group, so sshd uses
      # administrators_authorized_keys instead of the per-user file.
      ansible.windows.win_copy:
        content: "{{ controller_public_key | trim }}\n"
        dest: C:\ProgramData\ssh\administrators_authorized_keys

    - name: Lock down administrators_authorized_keys ACLs
      ansible.windows.win_powershell:
        script: |
          $path = 'C:\ProgramData\ssh\administrators_authorized_keys'
          # sshd refuses the key file unless only Administrators + SYSTEM
          # can write. Build the target ACL and apply it if drift is found.
          $acl = Get-Acl $path
          $want = @{
            'BUILTIN\Administrators' = 'FullControl'
            'NT AUTHORITY\SYSTEM'    = 'FullControl'
          }
          $current = $acl.Access | ForEach-Object {
            "$($_.IdentityReference)=$($_.FileSystemRights)"
          }
          $expected = $want.GetEnumerator() | ForEach-Object {
            "$($_.Key)=$($_.Value)"
          }
          $matches = ($current.Count -eq $expected.Count) -and
                     ((Compare-Object $current $expected -SyncWindow 0) -eq $null)
          if ($matches) {
            $Ansible.Changed = $false
            return
          }
          # icacls is more reliable than Set-Acl for the inheritance reset
          icacls $path /inheritance:r | Out-Null
          icacls $path /grant 'Administrators:F' 'SYSTEM:F' | Out-Null
          $Ansible.Changed = $true
