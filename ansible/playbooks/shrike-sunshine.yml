---
# Surgical playbook: install + configure Sunshine (Moonlight stream host)
# without re-running the rest of the bootstrap. Useful for tweaking
# sunshine.conf or refreshing firewall rules in isolation.
#
# Usage:
#   ansible-playbook playbooks/shrike-sunshine.yml --ask-pass
- name: Configure Sunshine on shrike
  hosts: windows
  gather_facts: false
  roles:
    - sunshine
